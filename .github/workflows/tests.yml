name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect affected packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      has_jobs: ${{ steps.compute.outputs.has_jobs }}
      affected: ${{ steps.compute.outputs.affected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff against the base / previous commit
      - name: Determine changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > changed.txt
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed.txt
          else
            echo "__ALL__" > changed.txt   # first push / unknown base -> test everything
          fi
          echo "Changed files:"; cat changed.txt
      - name: Compute test matrix
        id: compute
        run: python3 Scripts/affected-test-matrix.py changed.txt >> "$GITHUB_OUTPUT"
      - name: Dump matrix (debug)
        env:
          AFFECTED: ${{ steps.compute.outputs.affected }}
          HAS_JOBS: ${{ steps.compute.outputs.has_jobs }}
          MATRIX: ${{ steps.compute.outputs.matrix }}
        run: |
          echo "has_jobs = $HAS_JOBS"
          echo "affected = $AFFECTED"
          JOBS=$(printf '%s' "$MATRIX" | python3 -c 'import json,sys; print(len(json.load(sys.stdin).get("include",[])))' 2>/dev/null || echo "?")
          echo "scheduled jobs = $JOBS"
          echo "----- generated matrix (pretty) -----"
          printf '%s' "$MATRIX" | python3 -m json.tool || printf '%s\n' "$MATRIX"
          {
            echo "## Test selection"
            echo "**has_jobs:** \`$HAS_JOBS\`  •  **scheduled jobs:** \`$JOBS\`"
            echo ""
            echo "**Affected packages:** $AFFECTED"
            echo ""
            echo "<details><summary>Generated matrix JSON ($JOBS jobs)</summary>"
            echo ""
            echo '```json'
            printf '%s' "$MATRIX" | python3 -m json.tool || printf '%s\n' "$MATRIX"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: ${{ matrix.package }} (${{ matrix.platform }})
    needs: detect
    if: needs.detect.outputs.has_jobs == 'true'
    runs-on: [self-hosted, macOS]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Test ${{ matrix.package }} on ${{ matrix.platform }}
        run: Scripts/run-package-tests.sh "${{ matrix.package }}" "${{ matrix.platform }}"

  # Single gate to use as the required status check in branch protection.
  # Does no work itself; it just aggregates the result of all `test` matrix jobs.
  # `if: always()` is required so it still runs (and reports pass/fail) when `test`
  # failed or was skipped — otherwise the gate would be skipped and a skipped required
  # check never satisfies branch protection.
  all-tests-pass:
    name: All tests pass
    if: always()
    needs: [detect, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify test results
        run: |
          echo "detect = ${{ needs.detect.result }}"
          echo "test   = ${{ needs.test.result }}"
          if [ "${{ needs.detect.result }}" != "success" ]; then
            echo "::error::The 'detect' job did not succeed — cannot determine which tests to run."
            exit 1
          fi
          case "${{ needs.test.result }}" in
            success|skipped)
              echo "All required tests passed (or no packages were affected)." ;;
            *)
              echo "::error::One or more test jobs did not pass (test result: ${{ needs.test.result }})."
              exit 1 ;;
          esac
