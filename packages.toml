# List of logical sub-packages within the monorepo
#
# Each entry is a logical sub-package within the monorepo: a collection of targets that belong
# together to implement a set of APIs. Used to map changed files -> affected sub-package -> tests.
#   platforms = the platforms the sub-package's upstream repo tested on (CI may schedule a subset).
#               "Linux" is recorded where upstream ran `swift test` on Linux; it is not yet scheduled
#               (xcodebuild CI is Apple-only) and SpeziAccount lists iOS deliberately (some tests fail).
#   targets   = its source target directories  (Sources/<name>)
#   tests     = its test target directories     (Tests/<name>; a Tests/<name>/UITests/ subfolder counts too)
# Note: SpeziFoundation's "CZlib" is a directory name (Sources/CZlib); its Swift target is "SpeziCZlib".

[FHIRModelsExtensions]
platforms = ["iOS", "macOS", "macCatalyst", "watchOS", "visionOS", "tvOS"]
targets = ["FHIRModelsExtensions", "FHIRPathParser", "FHIRQuestionnaires"]
tests = ["FHIRModelsExtensionsTests", "FHIRPathParserTests"]

[HealthKitOnFHIR]
