targets = ["HealthKitOnFHIR", "HealthKitOnFHIRMacros", "HealthKitOnFHIRMacrosImpl"]
tests = ["HealthKitOnFHIRTests", "HealthKitOnFHIRMacrosTests"]
uiTests = ["iOS"]

