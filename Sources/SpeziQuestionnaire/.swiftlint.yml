# SpeziQuestionnaire's upstream repository intentionally did not enable `function_default_parameter_at_end`
# (it is the only one of the 35 packages that omitted it). Several of its public initializers place a
# defaulted parameter before a required one by design, so reordering would break the public API. This
# nested config preserves that single opt-out; all other rules are inherited from the root .swiftlint.yml.
disabled_rules:
  - function_default_parameter_at_end
